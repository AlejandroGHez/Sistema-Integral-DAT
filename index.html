<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema Integral DAT v5.0 ENTERPRISE</title>

<style>
:root{
  --primary:#2563eb;
  --sidebar:#0f172a;
  --bg:#f3f6fb;
  --card:#ffffff;
  --border:#e5e7eb;
  --danger:#dc2626;
  --warning:#f59e0b;
  --success:#16a34a;
  --text:#1f2937;
}

*{box-sizing:border-box;}
body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:var(--bg);
  color:var(--text);
  display:flex;
  height:100vh;
}

/* ======================
   SIDEBAR
====================== */

.sidebar{
  width:260px;
  background:var(--sidebar);
  color:white;
  padding:20px;
  display:flex;
  flex-direction:column;
}

.sidebar h2{
  margin-top:0;
  font-size:18px;
}

.nav-item{
  padding:8px 10px;
  border-radius:6px;
  margin:6px 0;
  cursor:pointer;
  font-size:14px;
}

.nav-item:hover{
  background:#1e293b;
}

.nav-item.active{
  background:var(--primary);
}

/* ======================
   MAIN
====================== */

.main{
  display:flex;
  flex-direction:column;
  flex:1;              /* 🔥 ESTA LÍNEA ES LA CLAVE */
  min-width:0;
}

.topbar{
  background:white;
  padding:12px 20px;
  border-bottom:1px solid var(--border);
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.content{
  padding:20px;
  overflow-y:auto;
  overflow-x:hidden;
  flex:1;
  min-width:0;   /* 🔥 ESTA ES LA CLAVE */
}

.card{
  max-width:100%;
  overflow:hidden;
}

html, body{
  overflow-x:hidden;
}

.app{
  display:flex;
  width:100%;
  max-width:100vw;   /* 🔥 esto elimina el espacio fantasma */
}

.content{
  flex:1;
  min-width:0;
  width:100%;
}
/* ======================
   CARDS
====================== */

.card{
  background:var(--card);
  padding:20px;
  border-radius:12px;
  box-shadow:0 4px 12px rgba(0,0,0,.05);
  margin-bottom:20px;
}

/* ======================
   BUTTONS
====================== */

button{
  padding:6px 10px;
  border-radius:6px;
  border:1px solid var(--border);
  cursor:pointer;
  font-size:13px;
}

button.primary{
  background:var(--primary);
  color:white;
  border:none;
}

button.danger{
  background:var(--danger);
  color:white;
  border:none;
}

button.warning{
  background:var(--warning);
  color:white;
  border:none;
}

/* ======================
   TABLES
====================== */

table{
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
}

th,td{
  padding:8px;
  border-bottom:1px solid var(--border);
  font-size:13px;
  text-align:left;
}

/* ======================
   MODAL
====================== */

.modal-overlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,.5);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:999;
}

.modal{
  background:white;
  padding:20px;
  border-radius:10px;
  width:500px;
  max-height:85vh;
  overflow:auto;
}

.form-group{
  margin-bottom:14px;
  display:flex;
  flex-direction:column;
}

.form-group label{
  font-size:12px;
  margin-bottom:4px;
  font-weight:bold;
}

.form-group input,
.form-group select,
.form-group textarea{
  padding:6px;
  border:1px solid var(--border);
  border-radius:6px;
  font-size:13px;
}

.modal-actions{
  margin-top:15px;
  display:flex;
  justify-content:flex-end;
  gap:8px;
}

/* ======================
   TOAST
====================== */

.toast{
  position:fixed;
  top:20px;
  right:20px;
  background:white;
  padding:12px 18px;
  border-radius:8px;
  box-shadow:0 4px 12px rgba(0,0,0,.2);
  display:none;
  z-index:1000;
  font-size:13px;
}

.toast.success{border-left:5px solid var(--success);}
.toast.error{border-left:5px solid var(--danger);}
.toast.info{border-left:5px solid var(--primary);}

/* ======================
   BADGES
====================== */

.badge{
  padding:3px 6px;
  border-radius:4px;
  font-size:11px;
  color:white;
}

.badge.ok{background:var(--success);}
.badge.prod{background:var(--primary);}
.badge.inc{background:var(--danger);}

/* ======================
   KPI DASHBOARD
====================== */

.kpi-container{
  display:flex;
  gap:15px;
  flex-wrap:wrap;
}

.kpi-card{
  flex:1;
  min-width:200px;
  padding:20px;
  border-radius:12px;
  background:white;
  box-shadow:0 4px 12px rgba(0,0,0,.05);
  border-left:6px solid var(--primary);
}

.kpi-card h4{
  margin:0;
  font-size:13px;
  color:#555;
}

.kpi-card span{
  font-size:26px;
  font-weight:bold;
}

/* ======================
   GANTT (BASE)
====================== */

.gantt-wrapper{
  width:100%;
  overflow-x:auto;
  overflow-y:hidden;
  border:1px solid var(--border);
  position:relative;
}

/* Fijar columna izquierda */
.g-label{
  position:sticky;
  left:0;
  z-index:2;
  background:white;
  border-right:1px solid var(--border);
}

.g-row-grid{
  display:grid;
  align-items:center;
  border-bottom:1px solid #eee;
}

.g-label{
  padding-left:6px;
  font-size:12px;
  border-right:1px solid var(--border);
  height:30px;
  display:flex;
  align-items:center;
  background:white;
}

.g-day-cell{
  border-right:1px solid #f0f0f0;
  height:30px;
}

.g-bar{
  height:18px;
  background:var(--primary);
  border-radius:4px;
  align-self:center;
}

.g-cell{
  text-align:center;
  font-size:11px;
  border-right:1px solid #eee;
  padding:4px 0;
}

.g-weekend{
  background:#f1f1f1;
}

.g-today{
  background:#dbeafe;
}

.status-aprobado{
  color:#16a34a;
  font-weight:bold;
}

.status-incidencia{
  color:#dc2626;
  font-weight:bold;
}


.status-warning{
  color:#f59e0b;
  font-weight:bold;
}

.status-critico{
  color:black;
  font-weight:bold;
}

.status-nueva{background:#fecaca;}
.status-datos{background:#e9d5ff;}
.status-analisis{background:#fed7aa;}
.status-confirmada{background:#fef08a;}
.status-asignada{background:#bae6fd;}
.status-suspendida{background:#ef4444;color:white;}
.status-atendida{background:#bbf7d0;}
.status-cerrada{background:#e5e7eb;}

#hdDashboard .card{
  cursor:pointer;
  user-select:none;
  transition:transform .1s ease, box-shadow .1s ease;
}

#hdDashboard .card:hover{
  transform:translateY(-2px);
  box-shadow:0 6px 14px rgba(0,0,0,.1);
}

#hdDashboard .card:active{
  transform:scale(0.97);
}


</style>
</head>

<body>

<div class="sidebar">
  <h2>Sistema DAT v5.0</h2>

  <div class="nav-item active" data-route="dashboard">Dashboard</div>
  <div class="nav-item" data-route="equipos">Equipos</div>
  <div class="nav-item" data-route="plan">Plan de Trabajo</div>
  <div class="nav-item" data-route="riesgos">Riesgos</div>
  <div class="nav-item" data-route="dependencias">Dependencias</div>
  <div class="nav-item" data-route="desviaciones">Desviaciones</div>
  <div class="nav-item" data-route="pruebas">Pruebas</div>
  <div class="nav-item" data-route="costos">Costos</div>
  <div class="nav-item" data-route="seguimiento">Entregables Varios Clientes</div>
  <div class="nav-item" data-route="incidencias">Incidencias</div>
  <div class="nav-item" data-route="bitacora">Bitácora</div>
  <div class="nav-item" data-route="minutas">Minutas</div>
  <div class="nav-item" onclick="renderHD()">HDs</div>
</div>

<div class="main">
  <div class="topbar">
  <div>
    Proyecto:
    <select id="projectSelector"></select>
    <button class="primary" id="btnNuevoProyecto">Nuevo</button>
    <button class="danger" onclick="deleteProject()">Eliminar</button>
  </div>
</div>


  <div class="content" id="app"></div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modalContent"></div>
</div>

<div class="toast" id="toast"></div>

<script>
/* =========================================================
   ARQUITECTURA BASE MULTI-PROYECTO ENTERPRISE
========================================================= */

const STORAGE_KEY = "DAT_V5_ENTERPRISE";
let currentRoute = "dashboard";

/* =========================
   STORE
========================= */
const Store = {
state:{
  currentProjectId:null,
  projects:{},
  seguimientoGlobal:[],
  hdsGlobal:[]
},

  init(){

    const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));

    if(saved){
      this.state = saved;
    if(!this.state.seguimientoGlobal){
    this.state.seguimientoGlobal = [];
    }
    } else {
      const id = this.generateId();
      this.state.currentProjectId = id;
      this.state.projects[id] = this.createEmptyProject("Proyecto Inicial");
      this.save();
    }
  },

  createEmptyProject(name){
    return {
      name:name,
      equipos:[],
      plan:[],
      riesgos:[],
      dependencias:[],
      desviacionesInternas:[],
      desviacionesCliente:[],
      pruebasInternas:[],
      pruebasProductivas:[],
      pruebasCliente:[],
      costos:[],
      counters:{}
    };
  },

  getProject(){

  const p = this.state.projects[this.state.currentProjectId];

  if(!p){
    return this.createEmptyProject("Proyecto Recuperado");
  }

  normalizeProjectStructure(p);

  return p;
},


  save(){
    localStorage.setItem(STORAGE_KEY, JSON.stringify(this.state));
  },

  nextId(module){
    const p = this.getProject();
    if(!p.counters[module]) p.counters[module] = 1;
    return p.counters[module]++;
  },

  generateId(){
    return "proj-" + Date.now() + "-" + Math.floor(Math.random()*1000);
  }

};

function normalizeProjectStructure(p){

  if(!p.equipos) p.equipos = [];
  if(!p.plan) p.plan = [];
  if(!p.riesgos) p.riesgos = [];
  if(!p.dependencias) p.dependencias = [];
  if(!p.desviacionesInternas) p.desviacionesInternas = [];
  if(!p.desviacionesCliente) p.desviacionesCliente = [];
  if(!p.pruebasInternas) p.pruebasInternas = [];
  if(!p.pruebasProductivas) p.pruebasProductivas = [];
  if(!p.pruebasCliente) p.pruebasCliente = [];
  if(!p.costos) p.costos = [];
  if(!p.seguimiento) p.seguimiento = [];
  if(!p.counters) p.counters = {};
  if(!p.incidencias) p.incidencias = [];
  if(!p.bitacora) p.bitacora = [];
  if(!p.minutas) p.minutas = [];

}

/* =========================
   UI UTILIDADES
========================= */

const UI = {

  openModal(html){
    document.getElementById("modalContent").innerHTML = html;
    document.getElementById("modalOverlay").style.display = "flex";
  },

  closeModal(){
    document.getElementById("modalOverlay").style.display = "none";
  },

  toast(message, type="info"){
    const t = document.getElementById("toast");
    t.className = "toast " + type;
    t.innerText = message;
    t.style.display = "block";
    setTimeout(()=>t.style.display="none",3000);
  }

};


/* =========================
   PROYECTOS MULTI
========================= */

function renderProjectSelector(){

  const select = document.getElementById("projectSelector");
  select.innerHTML = "";

  Object.entries(Store.state.projects).forEach(([id,p])=>{
    const option = document.createElement("option");
    option.value = id;
    option.textContent = p.name;
    if(id === Store.state.currentProjectId){
      option.selected = true;
    }
    select.appendChild(option);
  });
}

document.getElementById("projectSelector").addEventListener("change",(e)=>{

  Store.state.currentProjectId = e.target.value;
  Store.save();

  // 🔥 Limpieza visual completa
  document.getElementById("app").innerHTML = "";

  // 🔥 Render limpio del módulo actual
  renderRoute(currentRoute);

});



document.getElementById("btnNuevoProyecto").addEventListener("click",()=>{

  UI.openModal(`
    <h3>Nuevo Proyecto</h3>

    <div class="form-group">
      <label>Nombre del Proyecto</label>
      <input id="nuevoProyectoNombre">
    </div>

    <div class="modal-actions">
      <button class="primary" onclick="crearProyecto()">Crear</button>
      <button onclick="UI.closeModal()">Cancelar</button>
    </div>
  `);

});

function crearProyecto(){

  const nombre = document.getElementById("nuevoProyectoNombre").value.trim();
  if(!nombre){
    UI.toast("Debe ingresar un nombre","error");
    return;
  }

  const id = Store.generateId();
  Store.state.projects[id] = Store.createEmptyProject(nombre);
  Store.state.currentProjectId = id;

  Store.save();
  renderProjectSelector();
  renderRoute("dashboard");

  UI.closeModal();
  UI.toast("Proyecto creado","success");
}

function deleteProject(){

  const confirmar = confirm(
    "¿Seguro que deseas eliminar este proyecto? Esta acción no se puede deshacer."
  );

  if(!confirmar) return;

  const currentId = Store.state.currentProjectId;

  // Eliminar proyecto actual
  delete Store.state.projects[currentId];

  const remainingIds = Object.keys(Store.state.projects);

  if(remainingIds.length > 0){
    // Activar el primero disponible
    Store.state.currentProjectId = remainingIds[0];
  } else {
    // Crear proyecto vacío automáticamente
    const id = Store.generateId();
    Store.state.currentProjectId = id;
    Store.state.projects[id] = Store.createEmptyProject("Proyecto Inicial");
  }

  Store.save();
  renderProjectSelector();
  renderRoute("dashboard");

  UI.toast("Proyecto eliminado","info");
}



/* =========================
   ROUTING
========================= */

document.querySelectorAll(".nav-item").forEach(item=>{
  item.addEventListener("click",()=>{
    document.querySelectorAll(".nav-item").forEach(i=>i.classList.remove("active"));
    item.classList.add("active");
    renderRoute(item.dataset.route);
  });
});

function renderRoute(route){

  currentRoute = route;

  if(route==="dashboard") renderDashboard();
  if(route==="equipos") renderEquipos();
  if(route==="plan") renderPlan();
  if(route==="riesgos") renderRiesgos();
  if(route==="dependencias") renderDependencias();
  if(route==="desviaciones") renderDesviaciones();
  if(route==="pruebas") renderPruebas();
  if(route==="costos") renderCostos();
  if(route==="seguimiento") renderSeguimiento();
  if(route==="incidencias") renderIncidencias();
  if(route==="bitacora") renderBitacora();
  if(route==="minutas") renderMinutas();

}


/* =========================================================
   FIN BLOQUE 2
========================================================= */
/* =========================================================
   DASHBOARD REACTIVO PROFESIONAL
========================================================= */

function renderDashboard(){

  const p = Store.getProject();

  // 🔒 Blindaje estructural
  if(!p.riesgos) p.riesgos = [];
  if(!p.dependencias) p.dependencias = [];
  if(!p.desviacionesInternas) p.desviacionesInternas = [];
  if(!p.desviacionesCliente) p.desviacionesCliente = [];
  if(!p.pruebasInternas) p.pruebasInternas = [];
  if(!p.pruebasProductivas) p.pruebasProductivas = [];
  if(!p.pruebasCliente) p.pruebasCliente = [];
  if(!p.costos) p.costos = [];

  // 🔹 Riesgos
  const riesgosAbiertos = p.riesgos.filter(r=>r.estado==="Abierto").length;
  const riesgosCerrados = p.riesgos.filter(r=>r.estado==="Cerrado").length;

  // 🔹 Dependencias
  const depPendientes = p.dependencias.filter(d=>d.estado==="Pendiente").length;
  const depRecibidas = p.dependencias.filter(d=>d.estado==="Recibido").length;

  // 🔹 Desviaciones
  const todasDesv = [...p.desviacionesInternas,...p.desviacionesCliente];
  const desvAbiertas = todasDesv.filter(d=>d.estado==="Abierta").length;
  const desvCerradas = todasDesv.filter(d=>d.estado==="Cerrada").length;

  // 🔹 Pruebas (última versión)
  const todasPruebas = [
    ...p.pruebasInternas,
    ...p.pruebasProductivas,
    ...p.pruebasCliente
  ];

  let incidencias = 0;
let correctas = 0;

todasPruebas.forEach(pr=>{

  const lista = pr.versiones || [];

  if(lista.length){

    const ultima = lista[lista.length-1];
    

    const estatus = (ultima.estatus || "").trim();

    if(estatus.toLowerCase()==="incidencia"){
      incidencias++;
    }

    if(estatus.toLowerCase()==="correcta"){
      correctas++;
    }

  }

});

  // 🔹 Costos
  let totalCosto = 0;
  let total130 = 0;
  let totalFinal = 0;

  p.costos.forEach(c=>{
    const horas = Number(c["HORAS DESARROLLO"] || c["Horas Desarrollo"] || 0);
    const costoHora = Number(c["COSTO HORA"] || c["Costo Hora"] || 0);
    const base = horas * costoHora;
    totalCosto += base;
    total130 += base * 1.3;
    totalFinal += base * 1.3 * 1.5;
  });

// 🔹 HDs (Equipos)

let totalHD = 0;
let totalDiasAtencion = 0;
let activos = 0;
let vencidos = 0;
let cumplenSLA = 0;

const SLA = 5; // días esperados

if(p.equipos){

  p.equipos.forEach(persona=>{

    if(persona.hds){

      persona.hds.forEach(hd=>{

        totalHD++;

        if(!hd.fechaAsignacion) return;

        const inicio = new Date(hd.fechaAsignacion);
        const fin = hd.fechaCierre
          ? new Date(hd.fechaCierre)
          : new Date();

        const diff = Math.ceil(
          (fin - inicio) / (1000*60*60*24)
        );

        totalDiasAtencion += diff;

        if(!hd.fechaCierre){
          activos++;
          if(diff > SLA) vencidos++;
        }

        if(hd.fechaCierre && diff <= SLA){
          cumplenSLA++;
        }

      });

    }

  });

}

const promedioAtencion = totalHD
  ? (totalDiasAtencion / totalHD).toFixed(1)
  : 0;

const porcentajeSLA = totalHD
  ? ((cumplenSLA / totalHD) * 100).toFixed(1)
  : 0;


  document.getElementById("app").innerHTML = `
    <div class="kpi-container">

      <div class="kpi-card">
        <h4>Riesgos Abiertos</h4>
        <span>${riesgosAbiertos}</span>
      </div>

      <div class="kpi-card">
        <h4>Dependencias Pendientes</h4>
        <span>${depPendientes}</span>
      </div>

      <div class="kpi-card">
        <h4>Desviaciones Abiertas</h4>
        <span>${desvAbiertas}</span>
      </div>

      <div class="kpi-card">
        <h4>Pruebas con Incidencia</h4>
        <span>${incidencias}</span>
      </div>

      <div class="kpi-card">
        <h4>Total Costo</h4>
        <span>$ ${totalCosto.toLocaleString()}</span>
      </div>

      <div class="kpi-card">
        <h4>Total ×1.3</h4>
        <span>$ ${total130.toLocaleString()}</span>
      </div>

      <div class="kpi-card">
        <h4>Total ×1.3 ×1.5</h4>
        <span>$ ${totalFinal.toLocaleString()}</span>
      </div>
      <div class="kpi-card">
      <h4>Tiempo Promedio Atención (días)</h4>
      <span>${promedioAtencion}</span>
      </div>

      <div class="kpi-card">
      <h4>HD Activos</h4>
      <span>${activos}</span>
      </div>

     <div class="kpi-card">
     <h4>HD Vencidos (&gt; ${SLA} días)</h4>
     <span>${vencidos}</span>
     </div>

     <div class="kpi-card">
     <h4>% Cumplimiento SLA</h4>
     <span>${porcentajeSLA}%</span>
     </div>



    </div>
  `;
}


/* =========================================================
   MÓDULO EQUIPOS
========================================================= */

function renderEquipos(){

  const p = Store.getProject();

  let html = `
    <div class="card">
      <button class="primary" onclick="openEquipo()">+ Miembro</button>
      <button onclick="exportHDs()">Exportar HDs</button>

      <table>
        <tr>
          <th>ID</th>
          <th>Nombre</th>
          <th>Área</th>
          <th>Rol</th>
          <th>HDs</th>
          <th></th>
        </tr>
  `;

  p.equipos.forEach(m=>{

 if(!m.hds) m.hds = [];
    html += `
      <tr>
        <td>${m.id}</td>
        <td>${m.nombre}</td>
        <td>${m.area}</td>
        <td>${m.rol}</td>
        <td>
          <button onclick="toggleHDs(${m.id})">Ver (${m.hds?.length || 0})</button>
          <button class="primary" onclick="openHD(${m.id})">+HD</button>
        </td>
        <td>
          <button class="danger" onclick="deleteEquipo(${m.id})">X</button>
        </td>
      </tr>

      <tr id="hdRow-${m.id}" style="display:none;">
        <td colspan="6">
          ${renderHDList(m)}
        </td>
      </tr>
    `;
  });

  html += `
      </table>
      ${renderHDChart()}
    </div>
  `;

  document.getElementById("app").innerHTML = html;
}



function openEquipo(){

  UI.openModal(`
    <h3>Nuevo Miembro</h3>

    <div class="form-group">
      <label>Nombre</label>
      <input id="eqNombre">
    </div>

    <div class="form-group">
      <label>Área</label>
      <input id="eqArea">
    </div>

    <div class="form-group">
      <label>Rol</label>
      <input id="eqRol">
    </div>

    <div class="modal-actions">
      <button class="primary" onclick="addEquipo()">Guardar</button>
      <button onclick="UI.closeModal()">Cancelar</button>
    </div>

function calcularDias(hd){

  const inicio = new Date(hd.fechaAsignacion);
  const fin = hd.fechaCierre ? new Date(hd.fechaCierre) : new Date();

  return Math.floor((fin-inicio)/(1000*60*60*24));
}

function buildJerarquia(plan){

  const padres = plan.filter(a=>!a.parentId);
  let result = [];

  padres.sort((a,b)=>a.id-b.id);

  padres.forEach((padre,i)=>{

    const codigoPadre = (i+1).toString();

    // 🔥 Buscar hijos
    const hijos = plan
      .filter(h=>h.parentId===padre.id)
      .sort((a,b)=>a.id-b.id);

    // 🔥 Calcular porcentaje automático si tiene hijos
    let porcentajePadre = padre.porcentaje || 0;

    if(hijos.length){

      const suma = hijos.reduce((acc,h)=>acc + Number(h.porcentaje||0),0);
      porcentajePadre = Math.round(suma / hijos.length);

      padre.porcentaje = porcentajePadre; // Actualiza modelo
    }

    result.push({
      ...padre,
      codigo:codigoPadre,
      nivel:0,
      porcentaje:porcentajePadre
    });

    hijos.forEach((h,j)=>{
      result.push({
        ...h,
        codigo:codigoPadre+"."+(j+1),
        nivel:1
      });
    });

  });

  return result;
}

/* =========================================================
   GANTT PROFESIONAL ENTERPRISE
========================================================= */

function renderGantt(ordered){

  if(!ordered.length) return "";

  // 🔥 FUNCIÓN SEGURA PARA CREAR FECHA LOCAL
  function parseLocalDate(dateString){
    const [year,month,day] = dateString.split("-").map(Number);
    return new Date(year, month-1, day);
  }

  const fechas = ordered.flatMap(a=>[
    parseLocalDate(a.inicio),
    parseLocalDate(a.fin)
  ]);

  const min = new Date(Math.min(...fechas));
  const max = new Date(Math.max(...fechas));

  const totalDias = Math.ceil((max-min)/(1000*60*60*24))+1;

  let dias = [];
  for(let d=0; d<totalDias; d++){
    const f = new Date(min);
    f.setDate(min.getDate()+d);
    dias.push(new Date(f));
  }

  let headerMes = `<div></div>`;
  let headerSemana = `<div></div>`;
  let headerDia = `<div></div>`;

  let currentMes = "";
  let mesStart = 0;

  let currentSemana = "";
  let semanaStart = 0;

  dias.forEach((f,index)=>{

    const mes = f.toLocaleDateString("es-MX",{month:"short"});
    const semana = "S"+Math.ceil(f.getDate()/7);

    if(mes !== currentMes){
      if(index>0){
        headerMes += `
          <div class="g-cell" style="grid-column:${mesStart+2}/${index+2}; font-weight:bold;">
            ${currentMes}
          </div>
        `;
      }
      currentMes = mes;
      mesStart = index;
    }

    if(semana !== currentSemana){
      if(index>0){
        headerSemana += `
          <div class="g-cell" style="grid-column:${semanaStart+2}/${index+2};">
            ${currentSemana}
          </div>
        `;
      }
      currentSemana = semana;
      semanaStart = index;
    }

    const isWeekend = f.getDay()===0 || f.getDay()===6;
    const isToday = f.toDateString()===new Date().toDateString();

    headerDia += `
      <div class="g-cell ${isWeekend?'g-weekend':''} ${isToday?'g-today':''}">
        ${f.getDate()}
      </div>
    `;
  });

  headerMes += `
    <div class="g-cell" style="grid-column:${mesStart+2}/${dias.length+2}; font-weight:bold;">
      ${currentMes}
    </div>
  `;

  headerSemana += `
    <div class="g-cell" style="grid-column:${semanaStart+2}/${dias.length+2};">
      ${currentSemana}
    </div>
  `;

  let html = `
  <div class="card" id="contenedorGantt">
<h3>Diagrama de Gantt</h3>
    <div class="gantt-wrapper">
  <div style="min-width:${220 + (totalDias*40)}px;">

      <div class="g-row-grid" style="grid-template-columns:220px repeat(${totalDias},40px);">
        ${headerMes}
      </div>

      <div class="g-row-grid" style="grid-template-columns:220px repeat(${totalDias},40px);">
        ${headerSemana}
      </div>

      <div class="g-row-grid" style="grid-template-columns:220px repeat(${totalDias},40px);">
        ${headerDia}
      </div>
  `;

  ordered.forEach(a=>{

    const inicio = parseLocalDate(a.inicio);
    const fin = parseLocalDate(a.fin);

    const start = Math.floor((inicio-min)/(1000*60*60*24));
    const dur = Math.floor((fin-inicio)/(1000*60*60*24))+1;

    html += `
      <div class="g-row-grid" style="grid-template-columns:220px repeat(${totalDias},40px);">

        <div class="g-label">
          ${a.codigo} ${a.nombre}
        </div>

        ${Array(totalDias).fill('<div class="g-day-cell"></div>').join('')}

        <div class="g-bar" style="grid-column:${start+2}/${start+dur+2};"></div>

      </div>
    `;
  });

  html += `
         </div>
    </div>
  </div>
  `;

  return html;
}

/* =========================================================
   PRUEBAS
========================================================= */

function getMensajeEstatus(estatus){
  if(estatus==="Correcta") return "Se solicita pase a producción";
  if(estatus==="Incidencia") return "Retorno a desarrollo";
  return "";
}
function renderPruebas(){

  const p = Store.getProject();

  // 🔥 Blindaje para proyectos antiguos
  if(!p.pruebasInternas) p.pruebasInternas = [];
  if(!p.pruebasProductivas) p.pruebasProductivas = [];
  if(!p.pruebasCliente) p.pruebasCliente = [];

  // 🔥 Si existía el arreglo viejo, lo migramos a Internas
  if(p.pruebas && p.pruebas.length){
    p.pruebasInternas = [...p.pruebasInternas, ...p.pruebas];
    delete p.pruebas;
    Store.save();
  }

  let html = `
    <div class="card">
      <h3>Pruebas Internas</h3>
      <button class="primary" onclick="openPrueba('Interna')">+ Prueba</button>
      ${renderTablaPruebas(p.pruebasInternas,'Interna')}
    </div>

    <div class="card">
      <h3>Pruebas Productivas</h3>
      <button class="primary" onclick="openPrueba('Productiva')">+ Prueba</button>
      ${renderTablaPruebas(p.pruebasProductivas,'Productiva')}
    </div>

    <div class="card">
      <h3>Pruebas Cliente</h3>
      <button class="primary" onclick="openPrueba('Cliente')">+ Prueba</button>
      ${renderTablaPruebas(p.pruebasCliente,'Cliente')}
    </div>
  `;

  document.getElementById("app").innerHTML = html;
}

function renderTablaPruebas(lista,tipo){

  if(!lista) lista = [];

  let html = `
    <table>
      <tr>
        <th></th>
        <th>Prueba</th>
        <th>Versión</th>
        <th>Fecha Ejecución</th>
        <th>Estatus</th>
        <th>Acción</th>
      </tr>
  `;

  lista.forEach(pr=>{

    if(!pr.versiones || !pr.versiones.length) return;

    const ultima = pr.versiones[pr.versiones.length-1];
    const isOpen = pr._expanded;

    let accion = "";
    if(ultima.estatus==="Correcta"){
      accion = "Se solicita pase a producción";
    }
    if(ultima.estatus==="Incidencia"){
      accion = "Retorno a desarrollo";
    }

    // 🔵 FILA PRINCIPAL (MISMO NIVEL)
    html+=`
  <tr style="background:#f8fafc; font-weight:bold;">
    <td>
      ${pr.versiones.length > 1 
        ? `<button onclick="togglePrueba('${tipo}',${pr.id})">
            ${isOpen ? "-" : "+"}
          </button>`
        : ""
      }
    </td>
    <td>${pr.descripcion}</td>
    <td>v${ultima.version}</td>
    <td>${ultima.fechaEjecucion || "-"}</td>
    <td>
  <span class="${
    ultima.estatus==="Correcta"
      ? "status-aprobado"
      : "status-incidencia"
  }">
    ${ultima.estatus}
  </span>
  <div style="font-size:11px; font-weight:normal;">
    ${getMensajeEstatus(ultima.estatus)}
  </div>
</td>
    <td style="white-space:nowrap;">
      <button onclick="openNuevaEjecucion('${tipo}',${pr.id})">
        Nueva Ejecución
      </button>
      <button class="danger" onclick="deletePruebaPadre('${tipo}',${pr.id})">
        Eliminar
      </button>
    </td>
  </tr>
`;

    // 🔽 HISTORIAL (si está expandido)
    if(isOpen && pr.versiones.length > 1){

      pr.versiones
        .slice(0,-1)
        .forEach(v=>{
          html+=`
            <tr style="background:#f1f5f9;">
              <td></td>
              <td style="padding-left:30px;">Histórico</td>
              <td>v${v.version}</td>
              <td>${v.fechaEjecucion || "-"}</td>
              <td>
  <span class="${
    v.estatus==="Correcta"
      ? "status-aprobado"
      : "status-incidencia"
  }">
    ${v.estatus}
  </span>
  <div style="font-size:11px;">
    ${getMensajeEstatus(v.estatus)}
  </div>
</td>
              <td></td>
            </tr>
          `;
        });

    }

  });

  html+="</table>";
  return html;
}

function openPrueba(tipo){

  UI.openModal(`
    <h3>Nueva Prueba (${tipo})</h3>

    <div class="form-group">
      <label>Descripción</label>
      <input id="pruebaDesc">
    </div>

    <div class="form-group">
      <label>Fecha Ejecución</label>
      <input type="date" id="pruebaFecha">
    </div>

    <div class="form-group">
      <label>Versión</label>
      <input id="pruebaVersion" placeholder="Ej: v1.0">
    </div>

    <div class="form-group">
      <label>Estatus</label>
      <select id="pruebaStatus">
        <option>Correcta</option>
        <option>Incidencia</option>
      </select>
    </div>

    <div class="modal-actions">
      <button class="primary" onclick="addPrueba('${tipo}')">Guardar</button>
      <button onclick="UI.closeModal()">Cancelar</button>
    </div>
  `);
}


function addPrueba(tipo){

  const p = Store.getProject();

  let lista = tipo==="Interna"
    ? p.pruebasInternas
    : tipo==="Productiva"
    ? p.pruebasProductivas
    : p.pruebasCliente;

  const descripcion = document.getElementById("pruebaDesc").value.trim();
  const fecha = document.getElementById("pruebaFecha").value;
  const estatus = document.getElementById("pruebaStatus").value;

  if(!descripcion){
    UI.toast("La descripción es obligatoria","error");
    return;
  }

  if(!fecha){
    UI.toast("La fecha es obligatoria","error");
    return;
  }

  lista.push({
    id: Store.nextId("pruebas"),
    descripcion,
    _expanded: true,   // 🔥 Se muestra automáticamente
    versiones:[
      {
        version:1,
        fechaEjecucion:fecha,
        estatus
      }
    ]
  });

  Store.save();
  UI.closeModal();
  renderPruebas();
}

function togglePrueba(tipo,id){

  const p = Store.getProject();

  let lista = tipo==="Interna"
    ? p.pruebasInternas
    : tipo==="Productiva"
    ? p.pruebasProductivas
    : p.pruebasCliente;

  const pr = lista.find(x=>x.id===id);

  if(!pr) return;

  pr._expanded = !pr._expanded;

  Store.save();
  renderPruebas();
}

    </div>

    <div class="form-group">

function addNuevaEjecucion(tipo,id){

  const p = Store.getProject();

  let lista = tipo==="Interna"
    ? p.pruebasInternas
    : tipo==="Productiva"
    ? p.pruebasProductivas
    : p.pruebasCliente;

  const pr = lista.find(x=>x.id===id);

  if(!pr){
    UI.toast("Prueba no encontrada","error");
    return;
  }

  const fecha = document.getElementById("nuevaFecha").value;
  const estatus = document.getElementById("nuevaEstatus").value;

  if(!fecha){
    UI.toast("La fecha es obligatoria","error");
    return;
  }

  // 🔥 Versionado seguro
  const ultimaVersion = pr.versiones.length
    ? Math.max(...pr.versiones.map(v=>v.version))
    : 0;

  pr.versiones.push({
    version: ultimaVersion + 1,
    fechaEjecucion: fecha,

  });

  UI.closeModal();

function renderControlRealCostos(){

  const p = Store.getProject();
  if(!p.costos || !p.costos.length) return "";

  let filas = "";
  let totalBase = 0;
  let totalReal = 0;
  let totalVenta13 = 0;
  let totalVenta195 = 0;

  p.costos.forEach((c,i)=>{

    const horas = Number(c["Horas Desarrollo"] || 0);
    const costoHora = Number(c["Costo Hora"] || 0);

    const costoBase = horas * costoHora;
    const venta13 = costoBase * 1.3;
    const venta195 = costoBase * 1.3 * 1.5;

    const costoAdicional = Number(c.costoAdicional || 0);
    const costoReal = costoBase + costoAdicional;

    totalBase += costoBase;
    totalReal += costoReal;
    totalVenta13 += venta13;
    totalVenta195 += venta195;

    const margen13 = venta13 - costoReal;
    const margen195 = venta195 - costoReal;

    const clase13 = getClaseMargen(margen13, venta13);
    const clase195 = getClaseMargen(margen195, venta195);

    filas += `
      <tr>
        <td>${c["ID"]}</td>
        <td>${c["HD"]}</td>
        <td>
          <input type="number"
                 value="${c.horasAdicionales}"
                 onchange="updateHorasAdicionales(${i}, this.value)">
        </td>
        <td>
          <input type="number"
                 value="${c.costoAdicional}"
                 onchange="updateCostoAdicional(${i}, this.value)">
        </td>
        <td>$ ${costoReal.toLocaleString()}</td>
        <td class="${clase13}">
          $ ${margen13.toLocaleString()}
        </td>
        <td class="${clase195}">
          $ ${margen195.toLocaleString()}
        </td>
      </tr>
    `;
  });

  const resumen = `
    <div style="margin-top:20px;">
      <strong>Total Proyecto</strong><br>
      Costo Base: $ ${totalBase.toLocaleString()}<br>
      Costo Real: $ ${totalReal.toLocaleString()}<br>
      Venta ×1.3: $ ${totalVenta13.toLocaleString()}<br>
      Venta ×1.3×1.5: $ ${totalVenta195.toLocaleString()}<br>
    </div>
  `;

  return `
    <div class="card">
      <h3>Control Real de Rentabilidad por HD</h3>
      <table>
        <tr>
          <th>ID</th>
          <th>HD</th>
          <th>Horas adicionales</th>
          <th>Costo adicional</th>
          <th>Costo total HD</th>
          <th>Margen vs ×1.3</th>
          <th>Margen vs ×1.3×1.5</th>
        </tr>
        ${filas}
      </table>
      ${resumen}
    </div>
  `;
}

function updateHorasAdicionales(index,value){
  const p = Store.getProject();
  p.costos[index].horasAdicionales = Number(value);
  Store.save();
  renderCostos();
}

function updateCostoAdicional(index,value){
  const p = Store.getProject();
  p.costos[index].costoAdicional = Number(value);

function getClaseMargen(margen, venta){
  const porcentaje = (margen / venta) * 100;

  if(porcentaje > 25) return "status-aprobado";
  if(porcentaje > 10) return "status-warning";
  if(porcentaje > 0) return "status-incidencia";
  return "status-critico";
}

function importCSV(){

  const file = document.getElementById("csvInput").files[0];
  if(!file) return;

  const reader = new FileReader();

  reader.onload = function(e){

    const text = e.target.result;
    const lines = text.split("\n");

    // 🔎 Buscar inicio de tabla real
    const startIndex = lines.findIndex(l => 
      l.startsWith("ID,HD")
    );

    if(startIndex === -1){
      alert("No se encontró la tabla de costos en el archivo.");
      return;
    }

    // 🔎 Buscar fin de tabla (antes de Total Días Esfuerzo)
    const endIndex = lines.findIndex((l,i) => 
      i > startIndex && l.includes("Total Días Esfuerzo")
    );

    const tableLines = lines.slice(
      startIndex,
      endIndex === -1 ? lines.length : endIndex
    );

    // 🔥 Parser que respeta comillas
    function parseLine(line){
      const matches = line.match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g);
      return matches ? matches.map(v =>
        v.replace(/^"|"$/g,"").trim()
      ) : [];
    }

    const headers = parseLine(tableLines[0]);

    const data = tableLines.slice(1)
      .filter(l => l.trim() !== "")
      .map(l=>{
        const values = parseLine(l);
        let obj = {};
        headers.forEach((h,i)=>{
          obj[h.trim()] = values[i] 
            ? values[i].replace(/\$/g,"").replace(/,/g,"").trim()
            : "";
        });
        return obj;
      });

    Store.getProject().costos = data.map(row => ({
  ...row,
  horasAdicionales: 0,
  costoAdicional: 0
}));
    Store.save();

    renderCostos();
   
  };

  reader.readAsText(file,"UTF-8");
}

async function exportarSeguimientoExcel(){

  const data = Store.state.seguimientoGlobal || [];

  if(!data.length){
    UI.toast("No hay información para exportar","error");
    return;
  }

  const wb = new ExcelJS.Workbook();
  const ws = wb.addWorksheet("Entregables");

  ws.columns = [
    {header:"Cliente",key:"cliente",width:20},
    {header:"Proyecto",key:"proyecto",width:25},
    {header:"Resumen",key:"resumen",width:40},
    {header:"Prioridad",key:"prioridad",width:12},
    {header:"Estado",key:"estado",width:15},
    {header:"Fecha Estimada",key:"fecha",width:18}
  ];

  data.forEach(item=>{
    ws.addRow({
      cliente:item.cliente,
      proyecto:item.proyecto,
      resumen:item.resumen,
      prioridad:item.prioridad,
      estado:item.estado,
      fecha:item.fechaEstimadaSistema
    });
  });

  // 🔵 Encabezado azul
  const header = ws.getRow(1);

  header.eachCell(cell=>{
    cell.fill={
      type:"pattern",
      pattern:"solid",
      fgColor:{argb:"FF1F4E78"}
    };
    cell.font={color:{argb:"FFFFFFFF"},bold:true};
    cell.alignment={horizontal:"center"};
  });

  // 🎨 Colores por prioridad
  ws.eachRow((row,rowNumber)=>{
    if(rowNumber===1) return;

    const prioridad = row.getCell(5).value;

    let color="FFFFFFFF";

    if(prioridad==="CRITICA") color="FFFF0000";
    if(prioridad==="ALTA") color="FFFFC000";
    if(prioridad==="MEDIA") color="FFFFFF00";

    row.getCell(5).fill={
      type:"pattern",
      pattern:"solid",
      fgColor:{argb:color}
    };
  });

  const buffer = await wb.xlsx.writeBuffer();

  const blob = new Blob([buffer],{
    type:"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"
  });

  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = "Entregables_Clientes.xlsx";
  link.click();

  UI.toast("Excel generado correctamente","success");
}

function exportarPlanProfesional(){

  const p = Store.getProject();
  const ordered = buildJerarquia(p.plan);

  if(!ordered.length){
    UI.toast("No hay actividades","error");
    return;
  }

  const fechas = ordered.flatMap(a=>[
    new Date(a.inicio),
    new Date(a.fin)
  ]);

  const min = new Date(Math.min(...fechas));
  const max = new Date(Math.max(...fechas));

  const dias = [];
  let cursor = new Date(min);

  while(cursor <= max){
    dias.push(new Date(cursor));
    cursor.setDate(cursor.getDate()+1);
  }

  let headerDias = "";
  dias.forEach(d=>{
    headerDias += `<th>${d.getDate()}/${d.getMonth()+1}</th>`;
  });

  let filas = "";

  ordered.forEach(a=>{

  const inicio = new Date(a.inicio);
  const fin = new Date(a.fin);

  let ganttCells = "";

  dias.forEach(d=>{

    if(d >= inicio && d <= fin){
      ganttCells += `<td style="background:#2563eb;"></td>`;
    }else{
      ganttCells += `<td></td>`;
    }

  });

  const indent = "&nbsp;".repeat(a.nivel*6);

  let porcentaje = Number(a.porcentaje || 0);

  let colorPorcentaje = "";

  if(porcentaje === 100){
    colorPorcentaje = "background:#16a34a;color:white;font-weight:bold;";
  }
  else if(porcentaje >= 80){
    colorPorcentaje = "background:#2563eb;color:white;font-weight:bold;";
  }
  else if(porcentaje >= 40){
    colorPorcentaje = "background:#facc15;font-weight:bold;";
  }
  else{
    colorPorcentaje = "background:#dc2626;color:white;font-weight:bold;";
  }

  const esPadre = !a.parentId;

  const estiloPadre = esPadre
    ? "background:#0f172a;color:white;font-weight:bold;"
    : "";

  filas += `
  <tr style="${estiloPadre}">
    <td>${a.codigo}</td>
    <td>${indent}${a.nombre}</td>
    <td>${a.responsable || ""}</td>
    <td>${a.inicio}</td>
    <td>${a.fin}</td>
    <td style="${colorPorcentaje}">
      ${porcentaje}%
    </td>
    ${ganttCells}
  </tr>
  `;

});

  const html = `
  <html xmlns:o="urn:schemas-microsoft-com:office:office"
        xmlns:x="urn:schemas-microsoft-com:office:excel"
        xmlns="http://www.w3.org/TR/REC-html40">

  <head>
  <meta charset="UTF-8">

  <style>

  table{
    border-collapse:collapse;
    font-family:Arial;
    font-size:12px;
  }

  th{
    background:#0f172a;
    color:white;
    padding:6px;
    border:1px solid #ccc;
  }

  td{
    padding:5px;
    border:1px solid #ccc;
  }

  </style>

  </head>

  <body>

  <h2>Plan de Trabajo</h2>

  <table>

  <tr>
  <th>Codigo</th>
  <th>Actividad</th>
  <th>Responsable</th>
  <th>Inicio</th>
  <th>Fin</th>
  <th>% Avance</th>
  ${headerDias}
  </tr>

  ${filas}

  </table>

  </body>
  </html>
  `;

  const blob = new Blob([html],{
    type:"application/vnd.ms-excel"
  });

  const link = document.createElement("a");

  link.href = URL.createObjectURL(blob);
  link.download = "Plan_Trabajo_Gantt.xls";

  link.click();

  UI.toast("Excel generado correctamente","success");

}

function parseXML(file){

const reader=new FileReader();

reader.onload=function(e){

const xml=new DOMParser().parseFromString(e.target.result,"text/xml");

const issues=[...xml.getElementsByTagName("issue")];

const hoy = new Date();
const diezDias = 10 * 24 * 60 * 60 * 1000;

issues.forEach(issue=>{

const id=issue.getElementsByTagName("id")[0]?.textContent;

if(Store.state.hdsGlobal.find(h=>h.id==id)) return;

const status=issue.getElementsByTagName("status")[0]?.textContent;

const lastUpdated=issue.getElementsByTagName("last_updated")[0]?.textContent;

const fechaActualizacion = new Date(Number(lastUpdated) * 1000);

// 🔹 regla de filtrado para cerrados
if(status === "cerrada"){

if((hoy - fechaActualizacion) > diezDias){
return;
}

}

Store.state.hdsGlobal.push({

id,
project:issue.getElementsByTagName("project")[0]?.textContent.trim(),
reporter:issue.getElementsByTagName("reporter")[0]?.textContent.trim(),
handler:issue.getElementsByTagName("handler")[0]?.textContent.trim(),
priority:issue.getElementsByTagName("priority")[0]?.textContent,
severity:issue.getElementsByTagName("severity")[0]?.textContent,
status,
resolution:issue.getElementsByTagName("resolution")[0]?.textContent,
category:issue.getElementsByTagName("category")[0]?.textContent,
date_submitted:issue.getElementsByTagName("date_submitted")[0]?.textContent,
last_updated:lastUpdated,
summary:issue.getElementsByTagName("summary")[0]?.textContent,
comment:""

});

});

Store.save();

renderHD();

}

reader.readAsText(file);

}

function loadXML(){

Store.state.hdsGlobal=[];

parseXML(e.target.files[0]);

}

document.getElementById("xmlFile").click();

async function exportHD(){

const data = Store.state.hdsGlobal || [];

const wb = new ExcelJS.Workbook();
const ws = wb.addWorksheet("HDs");

ws.columns = [
{header:"HD",key:"HD",width:10},
{header:"Proyecto",key:"Proyecto",width:25},
{header:"Informador",key:"Informador",width:20},
{header:"Asignada",key:"Asignada",width:20},
{header:"Prioridad",key:"Prioridad",width:12},
{header:"Severidad",key:"Severidad",width:12},
{header:"Estatus",key:"Estatus",width:18},
{header:"Resolucion",key:"Resolucion",width:18},
{header:"Categoria",key:"Categoria",width:20},
{header:"FechaEnvio",key:"FechaEnvio",width:15},
{header:"UltimaActualizacion",key:"UltimaActualizacion",width:20},
{header:"Resumen",key:"Resumen",width:60},
{header:"Comentarios",key:"Comentarios",width:40}
];

data.forEach(h=>{

ws.addRow({
HD:h.id,
Proyecto:h.project,
Informador:h.reporter,
Asignada:h.handler,
Prioridad:h.priority,
Severidad:h.severity,
Estatus:h.status,
Resolucion:h.resolution,
Categoria:h.category,
FechaEnvio:formatDate(h.date_submitted),
UltimaActualizacion:formatDate(h.last_updated),
Resumen:h.summary,
Comentarios:h.comment||""
});

});

const headerRow = ws.getRow(1);

headerRow.eachCell(cell=>{
cell.fill={
type:"pattern",
pattern:"solid",
fgColor:{argb:"FF1F4E78"}
};
cell.font={
color:{argb:"FFFFFFFF"},
bold:true
};
cell.alignment={horizontal:"center"};
});

ws.eachRow((row,rowNumber)=>{

if(rowNumber===1) return;

const status=row.getCell(7).value;

let color="FFFFFFFF";

if(status==="nueva") color="FFF8CBAD";
if(status==="se necesitan más datos") color="FFE4DFEC";
if(status==="Análisis DAT") color="FFFCE4D6";
if(status==="confirmada") color="FFFFF2CC";
if(status==="asignada") color="FFDDEBF7";
if(status==="suspendida") color="FFFF0000";
if(status==="Atendida/Esperando Vo.Bo.") color="FFC6EFCE";
if(status==="cerrada") color="FFD9D9D9";

row.getCell(7).fill={
type:"pattern",
pattern:"solid",
fgColor:{argb:color}
};

});

const buffer = await wb.xlsx.writeBuffer();

const blob = new Blob([buffer],{
type:"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"
});

const link=document.createElement("a");

link.href=URL.createObjectURL(blob);
link.download="Reporte_Control_HDs.xlsx";

link.click();

}
function updateComment(index,text){

Store.state.hdsGlobal[index].comment=text;

Store.save();

}

function statusClass(status){

switch(status){

case "nueva":
return "status-nueva";

case "se necesitan más datos":
return "status-datos";

case "Análisis DAT":
return "status-analisis";

case "confirmada":
return "status-confirmada";

case "asignada":
return "status-asignada";

case "suspendida":
return "status-suspendida";

case "Atendida/Esperando Vo.Bo.":
return "status-atendida";

case "cerrada":
return "status-cerrada";

default:
return "";

}

}


function filterHD(col,value){

const table=document.getElementById("tablaHD");

const rows=[...table.getElementsByTagName("tr")].slice(2);

value=value.toLowerCase();

rows.forEach(r=>{

const cell=r.getElementsByTagName("td")[col];

if(!cell) return;

const text=cell.textContent.toLowerCase();

r.style.display=text.includes(value) ? "" : "none";

});

}


function formatDate(ts){

if(!ts) return "";

const d = new Date(Number(ts)*1000);

const day = String(d.getDate()).padStart(2,"0");
const month = String(d.getMonth()+1).padStart(2,"0");
const year = d.getFullYear();

return `${day}/${month}/${year}`;

}

function filterStatus(status){

const rows=document.querySelectorAll("#tablaHD tbody tr");

rows.forEach(r=>{

const cell=r.children[6];

if(!cell) return;

if(cell.textContent===status){
r.style.display="";
}else{
r.style.display="none";
}

});

}

/* =========================================================

Store.init();
renderProjectSelector();
renderRoute("dashboard");
